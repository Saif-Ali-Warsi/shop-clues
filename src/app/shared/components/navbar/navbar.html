<nav>

  <a routerLink="/">Logo</a>

  @if (!authService.isLoggedIn()) {

  <a routerLink="/products"> Products </a>
  <a routerLink="/login"> Login </a>

  } @else {
  <a routerLink="/profile">Profile</a>
  <a routerLink="/cart">Cart {{cartCount()}}</a>

  <a (click)="logout()">
    Logout
  </a>

  }

</nav>
