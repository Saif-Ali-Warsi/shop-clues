<div class="common-wrapper wrapper">

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-field">
            <input type="text" formControlName="username" placeholder="Username: emilys" />
        </div>
        <div class="form-field">
            <input type="password" formControlName="password" placeholder="Password: emilyspass" />
        </div>


        <div class="form-field">
            <button type="submit">Login</button>
        </div>
    </form>

</div>
