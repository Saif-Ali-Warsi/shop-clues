<div class="login-page-container">
  <div class="login-card glass-effect-bg">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Please sign in to your account to continue</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-field">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" formControlName="username" placeholder="e.g., emilys" />
          @if(username?.touched && username?.hasError('required')){
          <p class="error-message">User name is required</p>
          }
        </div>
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" formControlName="password" placeholder="••••••••••••" />
          @if(password?.touched && password?.hasError('required')){
          <p class="error-message">Password is required</p>
          }
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="loginForm.invalid" class="submit-btn">
          Sign In
        </button>
      </div>
    </form>
  </div>
</div>
