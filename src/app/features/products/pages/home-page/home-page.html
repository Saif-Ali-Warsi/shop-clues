<section>
    <swiper-container [config]="swiperConfig" slides-per-view="1" navigation="true" pagination="true">
        @for (slide of slides; track $index) {
        <swiper-slide>
            <div class="slide-content">
                <img [src]="slide.img" alt="Product Slide" style="width: 100%; display: block;">
            </div>
        </swiper-slide>
        }
    </swiper-container>
</section>

<section>
    <div class="category-card-container">
        @for(category of categories; track category.slug){
        <app-category-card [category]="category"></app-category-card>
        }
    </div>
</section>

<section>
    <h1>Trending Products</h1>
    <div class="products-card-container">
        @for(product of trendingProducts; track product.id){
        <app-product-card [product]="product"></app-product-card>
        }
    </div>
</section>

<section>
    <h1>Best Seller</h1>
    <div class="products-card-container">
        @for(product of bestSeller; track product.id){
        <app-product-card [product]="product"></app-product-card>
        }
    </div>
</section>
