<div class="mobile-filter-bar">
    <button (click)="openFilters()">
        <img src="https://www.image2url.com/r2/default/images/1783792678538-96fb6181-37e2-460c-aa65-e946d1781a4d.png"
            alt=""> <span>
            Choose Filters
        </span>
    </button>
</div>


<section class="product-list-wrapper">

    @if(filterOpen()){
    <div class="sidebar-backdrop" (click)="closeFilters()">
    </div>
    }

    <div class="sidebar-container" [class.open]="filterOpen()">
        <app-filter-sidebar (sortChanged)="onSortChanged($event)" [checkedCategories]="selectedCategories()"
            (categoriesChanged)="onCategoriesChanged($event)" (filterClosed)="closeFilters()">
        </app-filter-sidebar>
    </div>

    <div class="product-grid">
        @if(!isLoading){
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Loading products...</p>
        </div>
        } @else {
        @for(product of products(); track product.id){
        <app-product-card [product]="product"></app-product-card>
        } @empty {
        <div class="empty-state">
            <p>No products found</p>
        </div>
        }
        }
    </div>

</section>
